name = "internal-sites-platform5"
main = "src/index.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# Routes for the deploy portal and protected internal sites.
# routes = [
#  { pattern = "internal-company.com/deploy*", zone_name = "internal-company.com" },
#  { pattern = "*.internal-company.com/*", zone_name = "internal-company.com" }
# ]

workers_dev = true

# Smart Placement
placement = { mode = "smart" }

# Observability
[observability.logs]
enabled = true

[[ dispatch_namespaces ]]
binding = "dispatcher"
namespace = "internal-sites" # make sure this is the same as the DISPATCH_NAMESPACE_NAME var

[[ d1_databases ]]
binding = "DB"
database_name = "internal-sites-platform"
database_id = "e1d58bf6-d93a-48cd-bd9c-065db12d57e1"
preview_database_id = ""

[vars]
DISPATCH_NAMESPACE_NAME = "internal-sites"
ACCOUNT_ID = "YOUR_ACCOUNT_ID_HERE"
SITE_DOMAIN = "internal-company.com"
DEPLOY_PATH = "/deploy"
# Set to "true" only for local development without Cloudflare Access.
DISABLE_ACCESS_IDENTITY_CHECK = "false"
